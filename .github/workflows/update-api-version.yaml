name: Update API Version

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract latest version
        id: changelog
        run: |
          LATEST=$(grep -m1 -Eo '^##[[:space:]]+v?[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | grep -Eo '[0-9]+\.[0-9]+\.[0-9]')

          if [ -z "$LATEST" ]; then
            echo " Failed to extract version"
            exit 1
          fi

          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Found version: $LATEST"

      - name: Update version in main.go
        run: |
          NEW="${{ steps.changelog.outputs.version }}"

          echo "Updating to version $NEW"

          # Replace safely
          sed -i -E "s/const version = \"[0-9]+\.[0-9]+\.[0-9]+\"/const version = \"$NEW\"/" cmd/api/main.go

      - name: Check if file changed
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add cmd/api/main.go
          git commit -m "chore: bump API version to ${{ steps.changelog.outputs.version }}"
          git push
